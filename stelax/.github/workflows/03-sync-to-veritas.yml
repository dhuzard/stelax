name: 03 Sync to Veritas

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Sync Issues to Veritas
        run: |
          python apps/exporter/exporter/sync_to_veritas.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERITAS_API_KEY: ${{ secrets.VERITAS_API_KEY }}
