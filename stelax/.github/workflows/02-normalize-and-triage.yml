name: 02 Normalize and Triage

on:
  workflow_run:
    workflows: ["01 Parse Issue Form"]
    types:
      - completed

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Run Normalization and Triage
        run: |
          # Note: In a real environment, you would download the parsed_issue.json artifact first.
          python apps/exporter/exporter/normalize_issue.py
          python apps/exporter/exporter/triage_issue.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.workflow_run.head_sha }} # Simplified for template
