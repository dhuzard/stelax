name: 05 E2E Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Form Validation Check
        run: |
          echo "Checking github issue forms syntax..."
          # dummy check
          grep 'name:' .github/ISSUE_TEMPLATE/*.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install exporter and test dependencies
        run: |
          cd apps/exporter
          pip install -e ".[dev]" --quiet

      - name: Run exporter unit tests
        run: |
          cd apps/exporter
          python -m pytest tests/ -v
